basePath: /api/v1
definitions:
  dtos.AssignPlanToCompanyDTO:
    properties:
      company_id:
        type: integer
      plan_id:
        type: integer
    required:
    - company_id
    - plan_id
    type: object
  dtos.CityDTO:
    properties:
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      state:
        $ref: '#/definitions/dtos.StateDTO'
      state_id:
        type: integer
    type: object
  dtos.CountryDTO:
    properties:
      id:
        type: integer
      is_active:
        type: boolean
      iso2:
        type: string
      iso3:
        type: string
      name:
        type: string
      numeric_code:
        type: string
      phone_code:
        type: string
      states:
        items:
          $ref: '#/definitions/dtos.StateDTO'
        type: array
      subregion:
        $ref: '#/definitions/dtos.SubregionDTO'
      subregion_id:
        type: integer
      timezones:
        type: string
    type: object
  dtos.CreateApplicationDTO:
    properties:
      candidate_id:
        minimum: 1
        type: integer
      company_id:
        minimum: 1
        type: integer
      job_id:
        minimum: 1
        type: integer
      notes:
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
      stage:
        enum:
        - applied
        - screening
        - technical
        - offer
        - hired
        - rejected
        type: string
    required:
    - candidate_id
    - company_id
    - job_id
    - stage
    type: object
  dtos.CreateCityDTO:
    properties:
      name:
        maxLength: 255
        minLength: 2
        type: string
      state_id:
        type: integer
    required:
    - name
    - state_id
    type: object
  dtos.CreateCompanyDTO:
    properties:
      logo_url:
        type: string
      name:
        maxLength: 255
        minLength: 2
        type: string
      plan_tier:
        enum:
        - free
        - premium
        - enterprise
        type: string
      slug:
        maxLength: 100
        minLength: 2
        type: string
      timezone:
        type: string
      trial_ends_at:
        type: string
    required:
    - name
    - plan_tier
    - slug
    - timezone
    type: object
  dtos.CreateCountryDTO:
    properties:
