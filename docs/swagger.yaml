host: localhost:8001
info:
  contact:
    email: support@dvra.com
    name: API Support
  description: API para sistema de reclutamiento y gestión de candidatos
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: DVRA API
  version: 1.2.0
paths:
  /admin/memberships:
    post:
      consumes:
      - application/json
      description: Asigna un usuario a una empresa (solo SuperAdmin)
      parameters:
      - description: Datos de la membresía
        in: body
        name: membership
        required: true
        schema:
          $ref: '#/definitions/dtos.CreateMembershipDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Crear membresía
      tags:
      - Memberships
  /admin/plans:
    get:
      description: Get all plans (SuperAdmin sees all, others see only public active
        plans)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get all plans
      tags:
      - plans
    post:
      consumes:
      - application/json
      description: Create a new subscription plan (SuperAdmin only)
      parameters:
      - description: Plan data
        in: body
        name: plan
        required: true
        schema:
          $ref: '#/definitions/dtos.PlanDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.PlanResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create plan
      tags:
      - plans
  /admin/plans/{id}:
    delete:
      description: Soft delete a plan (SuperAdmin only)
      parameters:
      - description: Plan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete plan
      tags:
      - plans
    get:
      description: Get a specific plan by ID
      parameters:
      - description: Plan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.PlanResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get plan by ID
      tags:
      - plans
    put:
      consumes:
      - application/json
      description: Update an existing plan (SuperAdmin only)
      parameters:
      - description: Plan ID
        in: path
        name: id
        required: true
        type: integer
      - description: Plan data
        in: body
        name: plan
        required: true
        schema:
          $ref: '#/definitions/dtos.UpdatePlanDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.PlanResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update plan
      tags:
      - plans
  /admin/plans/{id}/toggle:
    patch:
      consumes:
      - application/json
      description: Enable or disable a plan (SuperAdmin only)
      parameters:
      - description: Plan ID
        in: path
        name: id
        required: true
        type: integer
      - description: Plan status
        in: body
        name: status
        required: true
        schema:
          $ref: '#/definitions/dtos.TogglePlanStatusDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.PlanResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Toggle plan status
      tags:
      - plans
  /admin/plans/assign:
    post:
      consumes:
      - application/json
      description: Assign a subscription plan to a company (SuperAdmin only)
      parameters:
      - description: Plan assignment
        in: body
        name: assignment
        required: true
        schema:
          $ref: '#/definitions/dtos.AssignPlanToCompanyDTO'
      produces:
